name: Sync Upstream

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Jstrom2022/tvbox-Swift.git
          git remote -v

      - name: Fetch upstream main
        run: git fetch upstream main

      - name: Merge upstream into fork main
        run: |
          set -euo pipefail
          BEFORE_SHA="$(git rev-parse HEAD)"
          git checkout main
          git merge --no-edit upstream/main
          AFTER_SHA="$(git rev-parse HEAD)"
          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_ENV"
          echo "after_sha=$AFTER_SHA" >> "$GITHUB_ENV"

      - name: Push merged commits
        run: |
          set -euo pipefail
          if [ "$before_sha" = "$after_sha" ]; then
            echo "No upstream changes to sync."
            exit 0
          fi
          git push origin HEAD:main
