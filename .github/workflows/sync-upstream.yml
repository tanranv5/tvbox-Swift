name: Sync Upstream

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      has_sync_changes: ${{ steps.detect.outputs.has_sync_changes }}
      has_code_changes: ${{ steps.detect.outputs.has_code_changes }}
      has_dockerfile: ${{ steps.detect.outputs.has_dockerfile }}
      dockerfile_path: ${{ steps.detect.outputs.dockerfile_path }}
      after_sha: ${{ steps.detect.outputs.after_sha }}
      after_sha_short: ${{ steps.detect.outputs.after_sha_short }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Jstrom2022/tvbox-Swift.git
          git remote -v

      - name: Fetch upstream main
        run: git fetch upstream main

      - name: Merge upstream into fork main
        id: merge
        run: |
          set -euo pipefail
          BEFORE_SHA="$(git rev-parse HEAD)"
          git checkout main
          git merge --no-edit upstream/main
          AFTER_SHA="$(git rev-parse HEAD)"
          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          echo "after_sha=$AFTER_SHA" >> "$GITHUB_OUTPUT"

      - name: Detect changes and docker conditions
        id: detect
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ steps.merge.outputs.before_sha }}"
          AFTER_SHA="${{ steps.merge.outputs.after_sha }}"
          AFTER_SHA_SHORT="${AFTER_SHA:0:12}"

          HAS_SYNC_CHANGES=false
          HAS_CODE_CHANGES=false
          HAS_DOCKERFILE=false
          DOCKERFILE_PATH=""

          if [ "$BEFORE_SHA" != "$AFTER_SHA" ]; then
            HAS_SYNC_CHANGES=true
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
            echo "Changed files from upstream sync:"
            echo "$CHANGED_FILES"

            while IFS= read -r file; do
              if [ -z "$file" ]; then
                continue
              fi
              if [[ ! "$file" =~ ^(README\.md|LICENSE|\.github/workflows/) ]]; then
                HAS_CODE_CHANGES=true
                break
              fi
            done <<< "$CHANGED_FILES"
          fi

          if [ -f Dockerfile ]; then
            HAS_DOCKERFILE=true
            DOCKERFILE_PATH="Dockerfile"
          elif [ -f docker/Dockerfile ]; then
            HAS_DOCKERFILE=true
            DOCKERFILE_PATH="docker/Dockerfile"
          fi

          echo "has_sync_changes=$HAS_SYNC_CHANGES" >> "$GITHUB_OUTPUT"
          echo "has_code_changes=$HAS_CODE_CHANGES" >> "$GITHUB_OUTPUT"
          echo "has_dockerfile=$HAS_DOCKERFILE" >> "$GITHUB_OUTPUT"
          echo "dockerfile_path=$DOCKERFILE_PATH" >> "$GITHUB_OUTPUT"
          echo "after_sha=$AFTER_SHA" >> "$GITHUB_OUTPUT"
          echo "after_sha_short=$AFTER_SHA_SHORT" >> "$GITHUB_OUTPUT"

          echo "has_sync_changes=$HAS_SYNC_CHANGES"
          echo "has_code_changes=$HAS_CODE_CHANGES"
          echo "has_dockerfile=$HAS_DOCKERFILE"
          echo "dockerfile_path=$DOCKERFILE_PATH"

      - name: Push merged commits
        if: steps.detect.outputs.has_sync_changes == 'true'
        run: git push origin HEAD:main

      - name: No upstream change notice
        if: steps.detect.outputs.has_sync_changes != 'true'
        run: echo "No upstream changes to sync."

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: sync
    if: needs.sync.outputs.has_code_changes == 'true' && needs.sync.outputs.has_dockerfile == 'true'

    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.after_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ needs.sync.outputs.dockerfile_path }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tvbox-swift:main
            ghcr.io/${{ github.repository_owner }}/tvbox-swift:${{ needs.sync.outputs.after_sha_short }}

  docker-build-skipped:
    runs-on: ubuntu-latest
    needs: sync
    if: needs.sync.outputs.has_code_changes != 'true' || needs.sync.outputs.has_dockerfile != 'true'

    steps:
      - name: Print skip reason
        run: |
          echo "Docker build skipped."
          echo "has_code_changes=${{ needs.sync.outputs.has_code_changes }}"
          echo "has_dockerfile=${{ needs.sync.outputs.has_dockerfile }}"
