name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional custom tag for this release
        required: false
        type: string
  push:
    branches: [ main ]
    paths:
      - 'package_mac.sh'
      - 'project.yml'
      - 'tvbox/**'
      - 'tvbox.xcodeproj/**'
      - '.github/workflows/build-macos-dmg.yml'

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build arm64 DMG
        run: |
          set -euo pipefail
          rm -rf build
          rm -f TVBox-macOS-arm64.dmg

          xcodebuild \
            -project tvbox.xcodeproj \
            -scheme tvbox-macOS \
            -configuration Release \
            SYMROOT="$PWD/build" \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            clean build

          app_path="build/Release/TVBox.app"
          test -d "$app_path"

          dmg_dir="build/dmg_stage_arm64"
          rm -rf "$dmg_dir"
          mkdir -p "$dmg_dir"
          cp -R "$app_path" "$dmg_dir/"
          ln -s /Applications "$dmg_dir/Applications"

          hdiutil create \
            -volname "TVBox-arm64" \
            -srcfolder "$dmg_dir" \
            -ov \
            -format UDZO \
            "TVBox-macOS-arm64.dmg"

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-macOS-arm64-dmg
          path: TVBox-macOS-arm64.dmg
          if-no-files-found: error

  build-x64:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build x64 DMG
        run: |
          set -euo pipefail
          rm -rf build
          rm -f TVBox-macOS-x64.dmg

          xcodebuild \
            -project tvbox.xcodeproj \
            -scheme tvbox-macOS \
            -configuration Release \
            SYMROOT="$PWD/build" \
            ARCHS="x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            clean build

          app_path="build/Release/TVBox.app"
          test -d "$app_path"

          dmg_dir="build/dmg_stage_x64"
          rm -rf "$dmg_dir"
          mkdir -p "$dmg_dir"
          cp -R "$app_path" "$dmg_dir/"
          ln -s /Applications "$dmg_dir/Applications"

          hdiutil create \
            -volname "TVBox-x64" \
            -srcfolder "$dmg_dir" \
            -ov \
            -format UDZO \
            "TVBox-macOS-x64.dmg"

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-macOS-x64-dmg
          path: TVBox-macOS-x64.dmg
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-arm64, build-x64]
    timeout-minutes: 20
    steps:
      - name: Prepare release metadata
        id: meta
        run: |
          set -euo pipefail
          INPUT_TAG="${{ github.event.inputs.release_tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="macos-build-$(date +%Y%m%d)-${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TVBox-macOS-arm64-dmg
          path: release-assets

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: TVBox-macOS-x64-dmg
          path: release-assets

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: TVBox macOS ${{ steps.meta.outputs.tag }}
          files: |
            release-assets/TVBox-macOS-arm64.dmg
            release-assets/TVBox-macOS-x64.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
